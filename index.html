<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazel 状态面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 2rem; }
  h1 { text-align: center; margin-bottom: 0.5rem; color: #a78bfa; font-size: 1.8rem; }
  .subtitle { text-align: center; color: #555; font-size: 0.85rem; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; max-width: 1200px; margin: 0 auto; }
  .card { background: #1a1a2e; border-radius: 12px; padding: 1.5rem; border: 1px solid #2a2a4a; transition: all 0.3s; cursor: pointer; user-select: none; }
  .card:hover { transform: translateY(-2px); border-color: #a78bfa; }
  .card.active { border-color: #a78bfa; grid-column: 1 / -1; }
  .card-header { display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.8rem; }
  .card-arrow { color: #555; font-size: 0.8rem; transition: transform 0.3s; }
  .card.active .card-arrow { transform: rotate(180deg); }
  .card-value { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .card-detail { font-size: 0.9rem; color: #999; line-height: 1.6; }
  .card-expanded { display: none; margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid #2a2a4a; font-size: 0.9rem; color: #bbb; line-height: 1.8; }
  .card.active .card-expanded { display: block; }
  .status-ok { color: #4ade80; }
  .status-warn { color: #fbbf24; }
  .status-mid { color: #60a5fa; }
  .status-purple { color: #a78bfa; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 0.3rem; }
  .tag-row { display: flex !important; align-items: center; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; flex-direction: row; }
  .tag-green { background: #064e3b; color: #4ade80; }
  .tag-blue { background: #172554; color: #60a5fa; }
  .tag-purple { background: #2e1065; color: #a78bfa; }
  .tag-red { background: #450a0a; color: #f87171; }
  .tag-time { background: #1a1a2e; color: #666; border: 1px solid #2a2a4a; font-size: 0.7rem; }
  .indicator { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #1f1f35; }
  .indicator:last-child { border-bottom: none; }
  .indicator-name { color: #999; }
  .indicator-value { font-weight: 600; }
  .indicator-met { color: #4ade80; }
  .indicator-unmet { color: #f87171; }
  .section-title { color: #a78bfa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.5rem 0; }
  .footer { text-align: center; margin-top: 2rem; color: #555; font-size: 0.8rem; }
</style>
</head>
<body>
  <h1>Hazel 状态面板</h1>
  <p class="subtitle">Ricky 的 AI 伙伴 -- 诞生于 2026-02-14</p>
  <div class="grid">

    <!-- BTC 抄底模型 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">BTC 抄底模型</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-mid" id="val-btc">--</div>
      <div class="card-detail">
        评级：<span id="btc-rating">--</span><br>
        <span style="color:#60a5fa; font-weight:600;" id="btc-price">--</span> <span style="color:#666;">|</span> <span id="btc-position">--</span>
      </div>
      <div class="tag-row"><span class="tag tag-blue">每天 9AM</span><span class="tag tag-time" id="ts-btc">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-btc"></div>
    </div>

    <!-- AI 前沿速报 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">AI 前沿速报</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-ok" id="val-report">--</div>
      <div class="card-detail" id="detail-report">--</div>
      <div class="tag-row"><span class="tag tag-green">每 8 小时</span><span class="tag tag-time" id="ts-report">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-report"></div>
    </div>

    <!-- 知识库 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">知识库</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-purple" id="val-kb">--</div>
      <div class="card-detail" id="detail-kb">--</div>
      <div class="tag-row"><span class="tag tag-purple">自动摄取</span><span class="tag tag-time" id="ts-kb">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-kb"></div>
    </div>

    <!-- 安全审查委员会 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">安全审查委员会</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-ok" id="val-security">--</div>
      <div class="card-detail" id="detail-security">--</div>
      <div class="tag-row"><span class="tag tag-green">每晚 3:30</span><span class="tag tag-time" id="ts-security">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-security"></div>
    </div>

    <!-- 定时任务 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">定时任务</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-ok" id="val-cron">--</div>
      <div class="card-detail" id="detail-cron">--</div>
      <div class="tag-row"><span class="tag tag-green">全部运行中</span><span class="tag tag-time" id="ts-cron">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-cron"></div>
    </div>

    <!-- 系统健康 -->
    <div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-title">系统健康</div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-value status-ok" id="val-health">--</div>
      <div class="card-detail" id="detail-health">--</div>
      <div class="tag-row"><span class="tag tag-green">系统正常</span><span class="tag tag-time" id="ts-health">上次更新：--</span></div>
      <div class="card-expanded" id="expanded-health"></div>
    </div>

  </div>
  <div class="footer">Hazel v1.3 -- 由 OpenClaw 驱动</div>

  <script>
    function toggle(card) {
      const wasActive = card.classList.contains('active');
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      if (!wasActive) card.classList.add('active');
    }

    function indicator(name, value, metClass) {
      return '<div class="indicator"><span class="indicator-name">' + name + '</span><span class="indicator-value' + (metClass ? ' ' + metClass : '') + '">' + value + '</span></div>';
    }

    function sectionTitle(text) {
      return '<div class="section-title">' + text + '</div>';
    }

    async function loadStatus() {
      try {
        const res = await fetch('status.json?t=' + Date.now());
        const data = await res.json();

        // Update timestamps and summary values
        for (const key of ['btc','report','kb','security','cron','health']) {
          const mod = data[key];
          if (!mod) continue;
          const tsEl = document.getElementById('ts-' + key);
          if (tsEl && mod.lastUpdate) tsEl.textContent = '上次更新：' + mod.lastUpdate;
          const valEl = document.getElementById('val-' + key);
          if (valEl && mod.summary) valEl.textContent = mod.summary;
        }

        // === BTC ===
        const btc = data.btc?.details;
        if (btc) {
          document.getElementById('btc-rating').textContent = btc.rating || '--';
          document.getElementById('btc-price').textContent = btc.price || '--';
          document.getElementById('btc-position').textContent = btc.position || '--';

          let html = sectionTitle('六大指标详情');
          (btc.indicators || []).forEach(ind => {
            html += indicator(ind.name, ind.value, ind.met ? 'indicator-met' : 'indicator-unmet');
          });
          html += sectionTitle('触发条件');
          html += indicator('4 个以上满足', '分批建仓（10-20%）');
          html += indicator('5 个以上满足', '重仓抄底（30-50%）');
          html += sectionTitle('数据来源');
          html += '<div class="card-detail">RSI / 成交量：CoinGecko（免费）<br>MVRV：CoinMetrics 社区版（免费）<br>恐惧指数：Alternative.me（免费）<br>矿机关机价：Blockchain.info + 估算<br>LTH 供应：Twitter xapi 搜索 Glassnode/Bitfinex 报告</div>';
          document.getElementById('expanded-btc').innerHTML = html;
        }

        // === Report ===
        const report = data.report?.details;
        if (report) {
          document.getElementById('detail-report').innerHTML = '新项目 + OpenClaw 案例<br>三渠道搜索：Lists + 关注 + 关键词';

          let html = sectionTitle('三大搜索渠道');
          (report.channels || []).forEach(ch => {
            html += indicator(ch.name, ch.value);
          });
          html += sectionTitle('筛选标准');
          html += '<div class="card-detail">' + (report.criteria || '').replace(/\n\n/g, '<br><br>') + '</div>';
          html += sectionTitle('推送时间');
          html += '<div class="card-detail">' + (report.schedule || '') + '</div>';
          document.getElementById('expanded-report').innerHTML = html;
        }

        // === KB ===
        const kb = data.kb?.details;
        if (kb) {
          const bd = kb.breakdown || {};
          const parts = Object.entries(bd).map(([k,v]) => v + ' ' + k);
          document.getElementById('detail-kb').innerHTML = parts.join(' | ');

          let html = sectionTitle('技术架构');
          const tech = kb.tech || {};
          for (const [k,v] of Object.entries(tech)) {
            html += indicator(k, v);
          }
          html += sectionTitle('三大防护机制');
          html += '<div class="card-detail">1. <strong>防压缩</strong> -- 关键信息存知识库而非 MEMORY.md，不会被对话压缩丢失<br><br>2. <strong>遗忘曲线</strong> -- 每条有重要度（1-5）和访问次数，重要的排更前，长期没用的可清理<br><br>3. <strong>数据聚合风险</strong> -- 安全审查每晚扫描，防止敏感信息碎片拼成完整隐私</div>';
          html += sectionTitle('使用方式');
          html += '<div class="card-detail">发链接 -> 自动入库<br>说"记住xxx" -> 存为笔记<br>问"之前谁聊过xx" -> 语义搜索</div>';
          html += sectionTitle('快速检索');
          html += '<div style="display:flex; gap:0.5rem; margin-top:0.5rem;" onclick="event.stopPropagation()">';
          html += '<input type="text" id="kb-search" placeholder="搜索知识库..." style="flex:1; padding:0.5rem 0.8rem; border-radius:8px; border:1px solid #2a2a4a; background:#0f0f1a; color:#e0e0e0; font-size:0.9rem; outline:none;" onkeydown="if(event.key===\'Enter\')searchKB()" onfocus="this.style.borderColor=\'#a78bfa\'" onblur="this.style.borderColor=\'#2a2a4a\'">';
          html += '<button onclick="event.stopPropagation();searchKB()" style="padding:0.5rem 1rem; border-radius:8px; border:none; background:#a78bfa; color:#fff; cursor:pointer; font-size:0.9rem;">搜索</button></div>';
          html += '<div id="kb-results" style="margin-top:0.8rem; font-size:0.85rem; color:#999;" onclick="event.stopPropagation()"></div>';
          document.getElementById('expanded-kb').innerHTML = html;
        }

        // === Security ===
        const sec = data.security?.details;
        if (sec) {
          const fixCount = (sec.fixes || []).length;
          document.getElementById('detail-security').innerHTML = '上次检查：' + (data.security.lastUpdate || '--') + '<br>发现 ' + fixCount + ' 个问题（均已修复）';

          let html = sectionTitle('六维审查');
          (sec.checks || []).forEach(ch => {
            html += indicator(ch.name, ch.status, ch.met ? 'indicator-met' : 'indicator-unmet');
          });
          if (sec.fixes && sec.fixes.length) {
            html += sectionTitle('今日修复记录');
            html += '<div class="card-detail">' + sec.fixes.map((f,i) => (i+1) + '. ' + f).join('<br>') + '</div>';
          }
          html += sectionTitle('处理原则');
          html += '<div class="card-detail">能自己修的直接修 -> 修不了的推 TG -> 没问题不打扰</div>';
          document.getElementById('expanded-security').innerHTML = html;
        }

        // === Cron ===
        const cron = data.cron?.details;
        if (cron) {
          const jobs = cron.jobs || [];
          const names = jobs.slice(0, 6).map(j => j.name.replace(/每日|委员会/g, '').trim());
          document.getElementById('detail-cron').innerHTML = names.join(' | ');

          let html = sectionTitle('任务列表');
          jobs.forEach(j => {
            html += indicator(j.name, j.schedule);
          });
          document.getElementById('expanded-cron').innerHTML = html;
        }

        // === Health ===
        const health = data.health?.details;
        if (health) {
          const items = health.items || [];
          const disk = items.find(i => i.name === '磁盘');
          const proxy = items.find(i => i.name === 'claude-proxy');
          document.getElementById('detail-health').innerHTML =
            '电脑磁盘使用率：' + (disk ? disk.value : '--') + '（健康）<br>代理服务：' + (proxy ? proxy.value : '--');

          let html = sectionTitle('系统状态');
          items.forEach(it => {
            html += indicator(it.name, it.value, it.met === true ? 'indicator-met' : (it.met === false ? 'indicator-unmet' : ''));
          });
          html += sectionTitle('架构');
          html += '<div class="card-detail">Telegram -> OpenClaw -> claude-proxy(:8082) -> Claude Opus 4.6<br>断路器保护：连续 3 次失败自动 fast-fail 60 秒</div>';
          document.getElementById('expanded-health').innerHTML = html;
        }

      } catch(e) { console.log('status.json not available', e); }
    }
    loadStatus();

    async function searchKB() {
      const q = document.getElementById('kb-search').value.trim();
      const r = document.getElementById('kb-results');
      if (!q) { r.innerHTML = '<span style="color:#f87171">请输入搜索词</span>'; return; }
      r.innerHTML = '<span style="color:#a78bfa">搜索中...</span>';
      try {
        const apiBase = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
          ? 'http://localhost:3456'
          : location.origin;
        const res = await fetch(apiBase + '/api/kb-search?q=' + encodeURIComponent(q));
        if (!res.ok) {
          r.innerHTML = '<span style="color:#fbbf24">搜索服务未启动，发 TG 给 Hazel："搜一下 ' + q + '"</span>';
          return;
        }
        const data = await res.json();
        if (!data.results?.length) { r.innerHTML = '没有找到相关内容'; return; }
        r.innerHTML = data.results.map(i =>
          '<div style="padding:0.4rem 0;border-bottom:1px solid #1f1f35">' +
          '<span style="color:#a78bfa">[' + i.type + ']</span> ' +
          '<strong style="color:#e0e0e0">' + i.title + '</strong><br>' +
          '<span>' + (i.content||'').slice(0,120) + '...</span></div>'
        ).join('');
      } catch(e) {
        r.innerHTML = '<span style="color:#fbbf24">搜索服务未启动，发 TG 给 Hazel："搜一下 ' + q + '"</span>';
      }
    }
  </script>
</body>
</html>
